<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>VANGUARD | Home</title>

    <link href="../css/index.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.1/css/fontawesome.min.css"
        integrity="sha384-QYIZto+st3yW+o8+5OHfT6S482Zsvz2WfOzpFSXMF9zqeLcFV0/wlZpMtyFcZALm" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
    <style>
        #leftCol {
            text-align: center;
            justify-content: center;
            align-items: center;
            display: flex;
        }

        .target-ip {
            text-align: center;
            justify-content: center;
            align-items: center;
            height: 400px;
        }

        .ip-form {
            width: 700px;
            margin: 0 auto;
            color: #001E24;
            position: relative;
        }

        .input-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 450px;
            margin: 0 auto;
        }

        #ip-msg {
            text-align: center;
            color: #001E24;
        }

        #ip-input {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 100px;
            padding: 10px 100px 10px 20px;
            line-height: 1;
            box-sizing: border-box;
            outline: none;
        }

        .rowDisplay {
            width: 100%;
        }

        .custom-submit-botton {
            position: absolute;
            right: 3px;
            top: 3px;
            bottom: 3px;
            border: 0;
            color: #335774;
            outline: none;
            margin: 3px 5px 3px 0;
            padding: 0 10px;
            border-radius: 150px;
            z-index: 2;
        }

        .loader {
            border: 16px solid #f3f3f3;
            border-radius: 50%;
            border-top: 16px solid #0D363A;
            width: 120px;
            height: 120px;
            -webkit-animation: spin 2s linear infinite;
            animation: spin 2s linear infinite;
            position: absolute;
            top: 50%;
            left: 46%;
            display: none;
        }

        /* Safari */
        @-webkit-keyframes spin {
            0% {
                -webkit-transform: rotate(0deg);
            }

            100% {
                -webkit-transform: rotate(360deg);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

            </path>
        </symbol>
        <symbol id="table" viewBox="0 0 16 16">
            <path fill="#FFFFFF"
                d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm15 2h-4v3h4V4zm0 4h-4v3h4V8zm0 4h-4v3h3a1 1 0 0 0 1-1v-2zm-5 3v-3H6v3h4zm-5 0v-3H1v2a1 1 0 0 0 1 1h3zm-4-4h4V8H1v3zm0-4h4V4H1v3zm5-3v3h4V4H6zm4 4H6v3h4V8z">

        </symbol>
    </svg>

    <div class="container-fluid">
        <div class="row flex-nowrap" style="height: 800px;">
            <div class="col-auto col-md-3 col-xl-3 px-sm-2 px-0" style="background: #1c1c1c;">
                <div class="d-flex flex-column flex-shrink-0 p-3 text-white">
                    <a id="logoA" class="navbar-brand" href="/">
                        <img id="vanguard_logo" src="../img/vanguard_logo.png" alt="Logo">
                    </a>

                    <hr>
                    <ul class="nav nav-pills flex-column mb-auto">
                        <li class="nav-item py-2">
                            <a href="/" class="nav-link text-white" aria-current="page">
                                <svg class="bi me-2" width="25" height="25">
                                    <use xlink:href="#home"></use>
                                </svg>Dashboard
                            </a>
                        </li>
                        <li class="py-2">
                            <a href="/" class="nav-link active" aria-current="page">
                                <svg class="bi me-2" width="25" height="25">
                                    <use xlink:href="#speedometer2"></use>
                                </svg>Configuration file
                            </a>
                        </li>
                        <li class="py-2">
                            <a href="history" class="nav-link text-white" aria-current="page">
                                <svg class="bi me-2" width="25" height="25">
                                    <use xlink:href="#table"></use>
                                </svg>History
                            </a>
                        </li>

                    </ul>
                </div>
            </div>
            <div class="col py-3" id="leftCol" style="background-color: #69B8CF;">
                <form>
                    <div class="form-group">
                      <label for="confText">Configuration File</label>
                      <textarea class="form-control" rows ="10" id="confText" aria-describedby="confHelp"></textarea>
                      <small id="confHelp" class="form-text text-muted"># at beginning of the line to comment out the port</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                  </form>
            </div>
        </div>
    </div>

    <script>
        
    </script>

</body>

</html>
